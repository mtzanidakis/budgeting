version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_PATH=/app/data/budgeting.db
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production}
      - LOG_LEVEL=info
    volumes:
      - db-data:/app/data
    restart: unless-stopped

volumes:
  db-data:
