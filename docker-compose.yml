services:
  budgeting-app:
    container_name: budgeting-app
    restart: unless-stopped
    user: 1000:1000
    environment:
      - PORT=4666
      - DATABASE_PATH=/data/budgeting.db
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production}
      - LOG_LEVEL=info
    volumes:
      - ./data:/data
