version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: budgeting-cli
    main: ./cmd/budgeting-cli
    binary: budgeting-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/manolis/budgeting/internal/version.Version={{.Version}}

archives:
  - id: budgeting-cli
    ids:
      - budgeting-cli
    name_template: "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - skill/SKILL.md
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt

release:
  draft: false

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore\\(deps\\):"
